# BabaAI frontend (React SPA)
#
#   cp .env.example .env
#   docker compose up --build
#
# Requires the API gateway on the URL set in VITE_API_BASE_URL.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babaai-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - .:/app
      - /app/node_modules
